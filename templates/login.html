{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<h2>Login</h2>

<form method="POST">

    <input
        type="email"
        name="email"
        class="form-control mb-3"
        placeholder="Email"
        required>

    <input
        type="password"
        name="password"
        class="form-control mb-3"
        placeholder="Password"
        required>

    <button class="btn btn-primary">
        Login
    </button>

</form>

{% endblock %}
